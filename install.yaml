name: canvas-migration
project_files:
  - config.canvas-migration.yaml
  - commands/nodejs/clone
  - commands/host/canvas-bootstrap
  - web-build/Dockerfile.canvas-migration
  - website-to-components
  - .claude/skills/website-to-components
  - .claude/skills/website-to-components-multipage
  - .claude/skills/migration-component-authoring
  - .claude/skills/migration-create-component
  - .claude/skills/migration-stories
  - .claude/skills/acquia-source-setup
  - .claude/skills/acquia-source-docs-explorer
  - .claude/skills/typography-audit
  - .claude/skills/webpage-sections-splitter
global_files: []
pre_install_actions: []
post_install_actions:
  - |
    #ddev-description:Move website-to-components from .ddev to project root
    if [ -d "${DDEV_APPROOT}/.ddev/website-to-components" ]; then
      cp -r "${DDEV_APPROOT}/.ddev/website-to-components" "${DDEV_APPROOT}/"
      rm -rf "${DDEV_APPROOT}/.ddev/website-to-components"
    fi
  - |
    #ddev-description:Move Claude skills from .ddev to project root
    if [ -d "${DDEV_APPROOT}/.ddev/.claude" ]; then
      mkdir -p "${DDEV_APPROOT}/.claude/skills"
      cp -r "${DDEV_APPROOT}/.ddev/.claude/skills/." "${DDEV_APPROOT}/.claude/skills/"
      rm -rf "${DDEV_APPROOT}/.ddev/.claude"
    fi
  - "echo ''"
  - "echo 'Canvas Migration addon installed.'"
  - "echo 'Run: ddev restart'"
  - "echo 'First, bootstrap local permissions (idempotent): ddev canvas-bootstrap'"
  - "echo 'Then use: ddev clone https://your-site.com'"
  - "echo 'Whole-site scope (--scope site) reads sitemap.xml and auto-validates URLs over HTTP.'"
  - "echo 'Validation checks HTTP 200, no redirects, no noindex, and canonical self-reference.'"
  - "echo 'Falls back to menu-reachable discovery if no sitemap found. No external dependency required.'"
removal_actions: []
