#ddev-generated
# Canvas Migration — installs website-to-components dependencies and fetches
# the latest agent-browser skill on every container start.
# Works standalone (brings its own agent-browser via Dockerfile.canvas-migration)
# or alongside FreelyGive/DDEV-Canvas (agent-browser already present).

hooks:
  post-start:
    # Fetch latest agent-browser skill definition
    - exec: "mkdir -p /var/www/html/.claude/skills/agent-browser && agent-browser skills get core --full > /var/www/html/.claude/skills/agent-browser/SKILL.md 2>/dev/null || true"
    # Wire the migration evals onto the ai_best_practices harness, if installed.
    # The eval runner ships with drupal/ai_best_practices and resolves each eval's
    # skill_file path relative to the MODULE root, but this addon installs the
    # skills under the PROJECT's .claude/skills. So copy the eval payloads into the
    # module's evals/ dir and point the module's .claude/skills at the project's
    # installed skills with a RELATIVE symlink (resolves the same on host and in
    # container). Idempotent and guarded: if the module is not vendored yet this is
    # a no-op, and it self-heals on the next `ddev restart` once it is.
    #
    # This addon's evals live in the PROJECT's evals/ dir alongside the
    # ai_best_practices evals (the installer copies the module's evals there too).
    # Only the migration evals are shipped with a grade.py per directory, so use
    # that as the marker to avoid re-copying the module's own evals onto itself.
    - exec: |
        APPROOT="/var/www/html"
        # Locate the ai_best_practices module by its eval runner rather than
        # assuming it sits under ${DDEV_DOCROOT}. The Drupal project may be
        # nested (composer root under web/, docroot web/web), so vendor/ does
        # not live at "${DDEV_DOCROOT}/vendor". Probe the common spots, then
        # fall back to a bounded find. Nothing found -> no-op (self-heals on a
        # later restart once the module is vendored).
        ABP=""
        for cand in \
          "${APPROOT}/${DDEV_DOCROOT:-web}/vendor/drupal/ai_best_practices" \
          "${APPROOT}/web/vendor/drupal/ai_best_practices" \
          "${APPROOT}/vendor/drupal/ai_best_practices"; do
          if [ -f "${cand}/evals/run-evals.py" ]; then ABP="${cand}"; break; fi
        done
        if [ -z "${ABP}" ]; then
          found=$(find "${APPROOT}" -maxdepth 5 -type f \
            -path "*/vendor/drupal/ai_best_practices/evals/run-evals.py" 2>/dev/null | head -n1)
          [ -n "${found}" ] && ABP="${found%/evals/run-evals.py}"
        fi
        if [ -n "${ABP}" ] && [ -d "${APPROOT}/evals" ]; then
          for eval_dir in "${APPROOT}/evals"/*/; do
            [ -d "${eval_dir}" ] || continue
            # Only sync this addon's own evals, marked by a per-dir grade.py.
            # The module's evals already live in ${ABP}/evals; skipping the
            # rest avoids copying them onto themselves.
            [ -f "${eval_dir}grade.py" ] || continue
            # Strip the trailing slash so the directory itself is copied
            # (cp -r "src/" "dest/" copies CONTENTS, not the dir).
            name=$(basename "${eval_dir}")
            rm -rf "${ABP}/evals/${name}"
            cp -r "${eval_dir%/}" "${ABP}/evals/${name}"
          done
          mkdir -p "${ABP}/.claude"
          # Relative path from ${ABP}/.claude back up to ${APPROOT}, then into
          # .claude/skills. Derive it from ABP's actual location under APPROOT
          # (not DDEV_DOCROOT): one "../" per path segment between them, plus one
          # more for the ".claude" segment the link lives in.
          modrel="${ABP#${APPROOT}/}"
          up=""
          rest="${modrel}/.claude"
          while [ -n "${rest}" ] && [ "${rest}" != "." ]; do
            up="../${up}"
            case "${rest}" in
              */*) rest="${rest%/*}" ;;
              *) rest="" ;;
            esac
          done
          ln -sfn "${up}.claude/skills" "${ABP}/.claude/skills"
        fi

web_extra_daemons:
  - name: npm-install-migration
    command: "bash -c 'npm --prefix /var/www/html/website-to-components install --silent && sleep infinity'"
    directory: /var/www/html
